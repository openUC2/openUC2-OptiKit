name: Build and Deploy to Configurator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Test and build job for all events
  build:
    runs-on: ubuntu-latest
  
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: |
        export NODE_OPTIONS=--max_old_space_size=4096
        CI=false npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/

  # Deploy job - only runs on push to main
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/
      
    - name: Deploy to youseetoo.github.io/configurator
      uses: cpina/github-action-push-to-another-repository@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB_YOUSEETOO }}
      with:
        source-directory: 'dist'
        destination-github-username: 'youseetoo'
        destination-repository-name: 'youseetoo.github.io'
        target-directory: 'configurator'
        user-email: 'bene.d@gmx.de'
        target-branch: 'main'
        commit-message: 'Deploy OptiKit configurator build from ${{ github.sha }}'
                